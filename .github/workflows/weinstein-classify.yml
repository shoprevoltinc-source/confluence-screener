name: Weinstein Classifier

on:
  schedule:
    - cron: "10 13 * * 1-5"  # 9:10am ET Mon-Fri
  workflow_dispatch:
    inputs:
      source:
        description: "Which scan(s) to pull from"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - jax
          - weekly
          - jax,weekly
          - recovery
          - catalyst
      top_n:
        description: "How many tickers to classify (0 = all)"
        required: false
        default: "0"
        type: string
      dry_run:
        description: "Dry run — classify but don't write to Firebase"
        required: false
        default: false
        type: boolean

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Weinstein Classifier
        env:
          FIREBASE_URL:        ${{ secrets.FIREBASE_DB_URL }}
          FIREBASE_TOKEN:      ${{ secrets.FIREBASE_TOKEN }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          TD_KEYS:             ${{ secrets.TD_KEYS }}
        run: |
          TOP="${{ github.event.inputs.top_n || '0' }}"
          if [ "$TOP" = "0" ]; then TOP="9999"; fi
          ARGS="--source ${{ github.event.inputs.source || 'all' }} --top $TOP"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "Running: node weinstein-classify.js $ARGS"
          node weinstein-classify.js $ARGS
