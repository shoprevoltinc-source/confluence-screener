name: Daily Full Scan

on:
  schedule:
    - cron: "0 12 * * 1-5"  # 8:00am ET Mon-Fri
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run Daily Full Scan
        env:
          TD_KEYS:         ${{ secrets.TD_KEYS }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: node daily-full-scan.js
