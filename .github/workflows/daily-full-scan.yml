name: Daily Full Scan

on:
  schedule:
    # 6:00am ET = 11:00 UTC (pre-market, before open)
    - cron: '0 11 * * 1-5'
    # 9:45am ET = 14:45 UTC (first scan after open)
    - cron: '45 14 * * 1-5'
    # 12:00pm ET = 17:00 UTC (midday)
    - cron: '0 17 * * 1-5'
    # 3:30pm ET = 20:30 UTC (final scan before close)
    - cron: '30 20 * * 1-5'

  workflow_dispatch:

jobs:
  daily-full-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run daily full scan
        env:
          TD_KEYS: ${{ secrets.TD_KEYS }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: node daily-full-scan.js
