name: Weekly Candle Scanner

on:
  schedule:
    - cron: "0 23 * * 3"  # Wednesday 7:00pm ET
    - cron: "0 22 * * 0"  # Sunday 6:00pm ET (fresh before Monday open)
  workflow_dispatch:

jobs:
  weekly-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run Weekly Scanner
        env:
          TD_KEYS:         ${{ secrets.TD_KEYS }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: node weekly-scanner.js
