name: JAX Scanner

on:
  schedule:
    - cron: "0 16 * * 1-5"   # 12:00pm ET Mon-Fri
    - cron: "30 19 * * 1-5"  # 3:30pm ET Mon-Fri
  workflow_dispatch:

jobs:
  jax-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run JAX Scanner
        env:
          TD_KEYS:         ${{ secrets.TD_KEYS }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: node jax-scanner.js
