name: JAX Scanner — 12pm & 3:30pm ET

on:
  schedule:
    - cron: '0 16 * * 1-5'
    - cron: '30 19 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run JAX Scanner
        env:
          TD_KEYS: ${{ secrets.TD_KEYS }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: node jax-scanner.js
