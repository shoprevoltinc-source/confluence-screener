name: JAX Scanner — 12pm & 3:30pm ET

on:
  schedule:
    # 12:00pm ET = 17:00 UTC (EST) / 16:00 UTC (EDT)
    - cron: '0 16 * * 1-5'
    # 3:30pm ET = 20:30 UTC (EST) / 19:30 UTC (EDT)  
    - cron: '30 19 * * 1-5'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run JAX Scanner
        env:
          TD_KEY_1: ${{ secrets.TD_KEY_1 }}
          TD_KEY_2: ${{ secrets.TD_KEY_2 }}
          TD_KEY_3: ${{ secrets.TD_KEY_3 }}
          TD_KEY_4: ${{ secrets.TD_KEY_4 }}
          TD_KEY_5: ${{ secrets.TD_KEY_5 }}
          TD_KEY_6: ${{ secrets.TD_KEY_6 }}
          TD_KEY_7: ${{ secrets.TD_KEY_7 }}
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
        run: node jax-scanner.js
