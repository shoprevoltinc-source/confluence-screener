<html lang="en">
<head>

<title>Confluence Screener</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#05080f;color:#e0e8ff;font-family:'Courier New',monospace;padding-bottom:60px}
.hdr{background:#070c18;border-bottom:1px solid #0b1a2e;padding:12px 16px;position:sticky;top:0;z-index:99}
.hdr-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.logo{font-size:15px;font-weight:700;color:#00C853;letter-spacing:2px}
.logo span{color:#00b0ff;font-weight:400}
.subtitle{font-size:8px;color:#00b0ff;margin-top:2px;letter-spacing:1px}
.hstats{display:flex;gap:16px}
.hs{text-align:center}
.hs-v{font-size:18px;font-weight:700;color:#00b0ff}
.hs-l{font-size:9px;color:#546E7A;letter-spacing:1px}
.stats{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
.stat-n{font-size:18px;font-weight:700;line-height:1}
.stat-l{font-size:8px;color:#546E7A;letter-spacing:1px;margin-left:3px}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:10px 14px;background:#060a13;border-bottom:1px solid #0b1a2e}
.controls label{font-size:10px;color:#78909C}
.run-btn{background:linear-gradient(135deg,#00C853,#00E676);color:#000;border:none;padding:7px 18px;font-family:monospace;font-size:11px;font-weight:700;cursor:pointer;border-radius:4px;box-shadow:0 0 12px #00C85544}
.run-btn:disabled{background:#0d1f35;color:#546E7A;cursor:not-allowed;box-shadow:none}
.stop-btn{background:transparent;color:#FF5252;border:1px solid #FF525244;padding:6px 12px;font-family:monospace;font-size:10px;cursor:pointer;border-radius:4px}
.clr-btn{background:transparent;color:#78909C;border:1px solid #1e3a5f;padding:6px 12px;font-family:monospace;font-size:10px;cursor:pointer;border-radius:4px}
select,input[type=number],input[type=text]{background:#0a1525;border:1px solid #1e3a5f;color:#e0e8ff;padding:5px 8px;font-family:monospace;font-size:10px;border-radius:3px}
.prog-wrap{padding:8px 16px;background:#060a13;border-bottom:1px solid #0b1a2e;display:none}
.prog-top{display:flex;justify-content:space-between;margin-bottom:4px}
.prog-msg{font-size:9px;color:#00b0ff}
.prog-pct{font-size:9px;color:#546E7A}
.prog-track{height:3px;background:#0b1a2e;border-radius:2px;overflow:hidden;margin-bottom:3px}
.prog-fill{height:3px;background:linear-gradient(90deg,#00C853,#00E676);width:0%;transition:width 0.4s}
.filter-bar{padding:8px 14px;display:none;gap:5px;flex-wrap:wrap;align-items:center;background:#060a13;border-bottom:1px solid #0b1a2e}
.chip{padding:4px 10px;font-family:monospace;font-size:9px;font-weight:700;cursor:pointer;border-radius:4px;border:1px solid #1e3a5f;background:transparent;color:#78909C}
.chip.on{border-color:#00C85566;background:#00C85322;color:#00C853}
.sort-select{background:#0a1525;border:1px solid #1e3a5f;color:#78909C;padding:3px 6px;font-family:monospace;font-size:9px;border-radius:3px;margin-left:8px}
.results{padding:10px 14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.card{border-radius:8px;padding:13px 15px;border:1px solid #0b1a2e;background:#08101e;cursor:pointer;transition:border-color 0.15s,transform 0.1s}
.card:hover{transform:translateY(-2px)}
.card.s6{background:linear-gradient(135deg,#00C85314,#060d18);border-color:#00C85340;box-shadow:0 0 20px #00C85510}
.card.s5{background:linear-gradient(135deg,#CCFF0008,#060d18);border-color:#CCFF0025}
.card.s6:hover{border-color:#00C853}
.card.s5:hover{border-color:#CCFF00}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.ticker{font-size:16px;font-weight:700;letter-spacing:1px;color:#fff}
.tv-hint{font-size:8px;color:#546E7A;margin-top:2px}

.chg{font-size:10px;margin-top:1px;text-align:right}
.cpos{color:#00C853}.cneg{color:#FF5252}

.bar-lbl{font-size:9px;color:#78909C;margin-bottom:2px}
.bar-row{display:flex;align-items:center;gap:5px}
.bar-track{flex:1;height:3px;background:#0d1f35;border-radius:2px;overflow:hidden}
.bar-fill{height:3px;border-radius:2px}
.bar-val{font-size:10px;min-width:30px;font-family:monospace}
.info-row{display:flex;gap:10px;font-size:9px;margin-bottom:7px;flex-wrap:wrap}
.tags{padding-top:7px;border-top:1px solid #0b1a2e}

.tag{font-size:8px;padding:2px 6px;border-radius:3px}
.log-panel{margin:8px 14px;padding:10px;background:#040709;border:1px solid #0b1a2e;border-radius:6px;max-height:140px;overflow-y:auto;font-size:10px}
.ll{padding:1px 0;color:#546E7A}

,"NDSN","NSC","NTRS","NOC","NCLH","NRG","NUE","NVDA","NVR","NXPI","ORLY","OXY","ODFL","OMC","ON","OKE","ORCL","OTIS","PCAR","PKG","PLTR","PANW","PARA","PH","PAYX","PAYC","PYPL","PNR","PEP","PFE","PCG","PM","PSX","PNW","PNC","POOL","PPG","PPL","PFG","PG","PGR","PLD","PRU","PEG","PTC","PSA","PHM","PWR","QCOM","DGX","RL","RJF","RTX","O","REG","REGN","RF","RSG","RMD","RVTY","ROK","ROL","ROP","ROST","RCL","SPGI","CRM","SBAC","SLB","STX","SRE","NOW","SHW","SPG","SWKS","SJM","SNA","SOLV","SO","LUV","SWK","SBUX","STT","STLD","STE","SYK","SYF","SNPS","SYY","TMUS","TROW","TTWO","TPR","TRGP","TGT","TEL","TDY","TFX","TER","TSLA","TXN","TXT","TMO","TJX","TSCO","TT","TDG","TRV","TRMB","TFC","TYL","TSN","USB","UBER","UDR","ULTA","UNP","UAL","UPS","URI","UNH","UHS","VLO","VTR","VLTO","VRSN","VRSK","VZ","VRTX","VTRS","VICI","V","VST","VMC","WAB","WBA","WMT","DIS","WBD","WM","WAT","WEC","WFC","WELL","WST","WDC","WY","WMB","WTW","GWW","WYNN","XEL","XYL","YUM","ZBRA","ZBH","ZTS"];
const WATCHLIST = ["SOFI","NKE","AAPL","NVDA","AMD","TSLA","META","GOOGL","MSFT","AMZN","JPM","BAC","PLTR","CRWD","UBER","HOOD","INTC","NOK","CELH","F"];
const GRADES = {6:{l:"A+ PERFECT",bg:"#00C853",fg:"#000"},5:{l:"A STRONG",bg:"#CCFF00",fg:"#000"},4:{l:"B+ WATCH",bg:"#FFD600",fg:"#000"},3:{l:"B WEAK",bg:"#FF6D00",fg:"#fff"}};
const LABELS = ["RSI<45","WR<-65","Above EMA21","EMA21 Rising","±10% EMA21","25%+ Off Hi"];

let results=[], stopReq=false, isRunning=false, activeFilter="all", errCount=0, scanned=0;

// ── Save / Load ────────────────────────────────────────────
function saveResults(){
  try{
    localStorage.setItem("cs_results",JSON.stringify(results));
    localStorage.setItem("cs_saved_at",new Date().toLocaleString());
    const b=document.getElementById("savedBanner");
    b.style.display="block";
    b.textContent="💾 Auto-saved "+results.length+" results at "+new Date().toLocaleTimeString();
    document.getElementById("savedAt").textContent="saved "+new Date().toLocaleTimeString();
  }catch(e){}
}
function loadSaved(){
  try{
    const raw=localStorage.getItem("cs_results");
    const at=localStorage.getItem("cs_saved_at");
    if(raw){
      results=JSON.parse(raw);
      if(results.length){
        scanned=results.length;
        document.getElementById("savedBanner").style.display="block";
        document.getElementById("savedBanner").textContent="💾 Saved scan from "+at+" — "+results.length+" results. Press LIVE SCAN to refresh.";
        document.getElementById("filterBar").style.display="flex";
        document.getElementById("statsRow").style.display="flex";
        renderResults(); updateHdr();
      }
    }
  }catch(e){}
}
function clearSaved(){
  try{localStorage.removeItem("cs_results");localStorage.removeItem("cs_saved_at");}catch(e){}
  results=[]; scanned=0; errCount=0;
  document.getElementById("savedBanner").style.display="none";
  document.getElementById("filterBar").style.display="none";
  document.getElementById("statsRow").style.display="none";
  document.getElementById("results").innerHTML='<div class="empty">Cleared. Press ▶ LIVE SCAN to scan fresh.</div>';
  updateHdr();
}

// ── Logging ────────────────────────────────────────────────
function log(msg,type=""){
  const p=document.getElementById("logPanel");
  const d=document.createElement("div");
  d.className="ll "+type;
  d.textContent="["+new Date().toLocaleTimeString()+"] "+msg;
  p.appendChild(d);
  if(p.children.length>500) p.removeChild(p.firstChild);
  p.scrollTop=p.scrollHeight;
}

// ── Tiingo fetch ───────────────────────────────────────────
async function fetchCandles(sym){
  const startDate = new Date(Date.now() - 380*24*60*60*1000).toISOString().split("T")[0];
  const url = TIINGO_BASE+"/"+sym+"/prices?startDate="+startDate+"&token="+TIINGO_TOKEN;
  const r = await fetch(url, {headers:{"Content-Type":"application/json"}});
  if(r.status===404) throw new Error("Symbol not found");
  if(r.status===429) throw new Error("Rate limit — try again in a minute");
  if(!r.ok) throw new Error("HTTP "+r.status);
  const data = await r.json();
  if(!data||!data.length) throw new Error("No data returned");
  // Tiingo returns oldest-first already
  return {
    closes: data.map(d=>d.adjClose||d.close),
    highs:  data.map(d=>d.high),
    lows:   data.map(d=>d.low),
    bars:   data.length
  };
}

// ── Indicators ─────────────────────────────────────────────
function calcRSI(c,p=14){
  if(c.length<p+1) return 50;
  let ag=0,al=0;
  for(let i=1;i<=p;i++){const d=c[i]-c[i-1];d>=0?ag+=d:al-=d;}
  ag/=p;al/=p;
  for(let i=p+1;i<c.length;i++){
    const d=c[i]-c[i-1];
    ag=(ag*(p-1)+Math.max(d,0))/p;
    al=(al*(p-1)+Math.max(-d,0))/p;
  }
  return al===0?100:100-100/(1+ag/al);
}
function calcEMA(c,p=21){
  if(c.length<p) return c[c.length-1];
  const k=2/(p+1);
  let e=c.slice(0,p).reduce((a,b)=>a+b,0)/p;
  for(let i=p;i<c.length;i++) e=c[i]*k+e*(1-k);
  return e;
}

function scoreStock(sym, closes, highs, lows){
  if(closes.length<36) throw new Error("Not enough bars: "+closes.length);
  const price    = closes[closes.length-1];
  const prev     = closes[closes.length-2];
  const change   = ((price-prev)/prev)*100;
  const rsi      = calcRSI(closes,14);
  const ema21    = calcEMA(closes,21);
  const ema21old = calcEMA(closes.slice(0,-5),21);
  const emaRising= ema21>ema21old;
  const hh=Math.max(...highs.slice(-14)), ll=Math.min(...lows.slice(-14));
  const wr=hh===ll?-50:((hh-price)/(hh-ll))*-100;
  const high52=Math.max(...highs);
  const pctHi=(price-high52)/high52*100;
  const pctEMA=(price-ema21)/ema21*100;
  const c1=rsi<45,c2=wr<-65,c3=price>ema21,c4=emaRising,c5=pctEMA>-10,c6=pctHi<-25;
  const conds=[c1,c2,c3,c4,c5,c6];
  return {sym,price,change,rsi,wr,ema21,emaRising,high52,pctHi,pctEMA,c1,c2,c3,c4,c5,c6,score:conds.filter(Boolean).length,conds};
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ── Main scan ──────────────────────────────────────────────
async function startScan(){
  if(isRunning) return;
  isRunning=true; stopReq=false; results=[]; errCount=0; scanned=0;
  document.getElementById("runBtn").disabled=true;
  document.getElementById("stopBtn").disabled=false;
  document.getElementById("progWrap").style.display="block";
  document.getElementById("filterBar").style.display="none";
  document.getElementById("statsRow").style.display="none";
  document.getElementById("savedBanner").style.display="none";
  document.getElementById("results").innerHTML="";
  document.getElementById("logPanel").innerHTML="";

  const listVal=document.getElementById("listSel").value;
  const tickers=listVal==="sp500"?[...SP500]:listVal==="watchlist"?[...WATCHLIST]
    :document.getElementById("customTk").value.split(",").map(s=>s.trim().toUpperCase()).filter(Boolean);
  const minScore=parseInt(document.getElementById("minSel").value);

  log("Scan: "+tickers.length+" stocks · Tiingo free (500/hr) · min "+minScore+"/6","info");
  log("Est. time: ~"+Math.ceil(tickers.length*0.15/60)+" min","info");

  for(let i=0;i<tickers.length;i++){
    if(stopReq){log("Stopped.","warn");break;}
    const sym=tickers[i];
    const pct=Math.round((i/tickers.length)*100);
    document.getElementById("progMsg").textContent="Scanning "+sym+" ("+(i+1)+"/"+tickers.length+")";
    document.getElementById("progPct").textContent=pct+"%";
    document.getElementById("progFill").style.width=pct+"%";

    try{
      const {closes,highs,lows}=await fetchCandles(sym);
      const r=scoreStock(sym,closes,highs,lows);
      scanned++;
      if(r.score>=minScore){
        results.push(r); renderResults();
        log("✓ "+sym.padEnd(6)+" "+r.score+"/6 | RSI:"+r.rsi.toFixed(1)+" WR:"+r.wr.toFixed(1)+" | "+r.pctHi.toFixed(1)+"% off hi","ok");
      } else {
        log("  "+sym.padEnd(6)+" "+r.score+"/6 | RSI:"+r.rsi.toFixed(1)+" WR:"+r.wr.toFixed(1));
      }
    }catch(e){
      errCount++;
      log("✗ "+sym+": "+e.message,"err");
      if(e.message.includes("Rate limit")){
        log("Waiting 61s for rate limit reset...","warn");
        await sleep(61000);
        i--; continue;
      }
    }
    updateHdr();
    // Save every 20 stocks
    if(scanned%20===0) saveResults();
    await sleep(100); // 100ms gap = ~10 req/sec, well under 500/hr
  }

  document.getElementById("progMsg").textContent="Done — "+scanned+" scanned, "+results.length+" passed";
  document.getElementById("progPct").textContent="100%";
  document.getElementById("progFill").style.width="100%";
  document.getElementById("runBtn").disabled=false;
  document.getElementById("stopBtn").disabled=true;
  isRunning=false;
  if(results.length){
    document.getElementById("filterBar").style.display="flex";
    document.getElementById("statsRow").style.display="flex";
    saveResults();
  }
  log("Complete. "+results.length+" passed. Auto-saved.","info");
}

function stopScan(){stopReq=true;document.getElementById("stopBtn").disabled=true;log("Stop requested...","warn");}

function updateHdr(){
  document.getElementById("h-scanned").textContent=scanned;
  document.getElementById("h-passed").textContent=results.length;
  document.getElementById("h-err").textContent=errCount;
  document.getElementById("h-top").textContent=results.length?Math.max(...results.map(r=>r.score))+"/6":"—";
  document.getElementById("cnt6").textContent=results.filter(r=>r.score===6).length;
  document.getElementById("cnt5").textContent=results.filter(r=>r.score===5).length;
  document.getElementById("cnt4").textContent=results.filter(r=>r.score===4).length;
}

function setFilter(v,btn){
  activeFilter=v;
  document.querySelectorAll(".chip").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  renderResults();
}

function renderResults(){
  const min=parseInt(document.getElementById("minSel").value);
  const sort=document.getElementById("sortSel")?.value||"score";
  let filtered=results.filter(r=>r.score>=min);
  if(activeFilter!=="all") filtered=filtered.filter(r=>r.score===activeFilter);
  filtered.sort((a,b)=>{
    if(sort==="pullback") return a.pctHi-b.pctHi;
    if(sort==="rsi")      return a.rsi-b.rsi;
    if(sort==="wr")       return a.wr-b.wr;
    return b.score-a.score||a.pctHi-b.pctHi;
  });
  document.getElementById("resCount").textContent=filtered.length+" shown";
  const grid=document.getElementById("results");
  if(!filtered.length){grid.innerHTML='<div class="empty">No results yet.</div>';return;}
  grid.innerHTML=filtered.map((s,i)=>renderCard(s,i)).join("");
  updateHdr();
}

function renderCard(s,idx){
  const g=GRADES[s.score]||{l:"SKIP",bg:"#546E7A",fg:"#fff"};
  const rC=s.rsi<30?"#00C853":s.rsi<45?"#64DD17":s.rsi>70?"#FF5252":"#78909C";
  const wC=s.wr<-80?"#00C853":s.wr<-65?"#64DD17":"#78909C";
  const cc=s.score>=6?"s6":s.score>=5?"s5":"";
  const dots=s.conds.map((on,i)=>`<div class="dot" title="${LABELS[i]}" style="background:${on?g.bg:"#0d1f35"}"></div>`).join("");
  const tags=LABELS.map((lbl,i)=>`<span class="tag" style="background:${s.conds[i]?g.bg+"22":"#0d1f35"};color:${s.conds[i]?g.bg:"#546E7A"};border:1px solid ${s.conds[i]?g.bg+"44":"#0b1a2e"}">${s.conds[i]?"✓":"✗"} ${lbl}</span>`).join("");
  return `<div class="card ${cc}" onclick="window.open('https://www.tradingview.com/chart/?symbol='+encodeURIComponent('${s.sym}'),'_blank')">
    <div class="card-top">
      <div>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:10px;color:#546E7A">#${idx+1}</span>
          <span class="ticker">${s.sym}</span>
          <span style="font-size:9px;padding:2px 7px;border-radius:3px;font-weight:700;background:${g.bg};color:${g.fg}">${g.l}</span>
        </div>
        <div class="tv-hint">📈 click → TradingView</div>
      </div>
      <div>
        <div class="price">$${s.price.toFixed(2)}</div>
        <div class="chg ${s.change>=0?"cpos":"cneg"}">${s.change>=0?"▲":"▼"}${Math.abs(s.change).toFixed(2)}%</div>
      </div>
    </div>
    <div class="dots">${dots}<span class="score-txt" style="color:${g.bg}">${s.score}/6</span></div>
    <div class="bars">
      <div><div class="bar-lbl">RSI14</div><div class="bar-row"><div class="bar-track"><div class="bar-fill" style="width:${s.rsi}%;background:${rC}"></div></div><span class="bar-val" style="color:${rC}">${s.rsi.toFixed(1)}</span></div></div>
      <div><div class="bar-lbl">Williams %R</div><div class="bar-row"><div class="bar-track"><div class="bar-fill" style="width:${Math.abs(s.wr)}%;background:${wC}"></div></div><span class="bar-val" style="color:${wC}">${s.wr.toFixed(1)}</span></div></div>
    </div>
    <div class="info-row">
      <span style="color:${s.c3?"#00C853":"#FF5252"}">${s.c3?"▲ ABOVE":"▼ BELOW"} EMA21 ($${s.ema21.toFixed(2)})</span>
      <span style="color:${s.c4?"#00C853":"#FF5252"}">${s.c4?"EMA RISING":"EMA FALLING"}</span>
    </div>
    <div class="tags">
      <div class="tag-row">${tags}</div>
      <div style="margin-top:5px;font-size:8px;color:${s.pctHi<-40?"#00C853":s.pctHi<-25?"#FFD600":"#78909C"}">
        📉 ${s.pctHi.toFixed(1)}% from 52w high · Hi $${s.high52.toFixed(2)}
      </div>
    </div>
  </div>`;
}

// ── Debug ──────────────────────────────────────────────────
async function debugStock(sym){
  if(!sym) return;
  const out=document.getElementById("dout");
  out.style.color="#00b0ff";
  out.textContent="Fetching "+sym+" from Tiingo...";
  try{
    const {closes,highs,lows,bars}=await fetchCandles(sym);
    const s=scoreStock(sym,closes,highs,lows);
    const p=(pass,lbl,val)=>(pass?"✅":"❌")+" "+lbl+": "+val;
    out.style.color=s.score>=4?"#00C853":s.score>=2?"#FFD600":"#90A4AE";
    out.textContent=[
      "══ "+sym+" — "+bars+" bars (Tiingo) ══",
      "Price: $"+s.price.toFixed(2)+"  (chg: "+s.change.toFixed(2)+"%)",
      "",
      p(s.c1,"C1 RSI14 < 45       ",s.rsi.toFixed(1)),
      p(s.c2,"C2 WR14 < -65       ",s.wr.toFixed(1)),
      p(s.c3,"C3 Above EMA21      ","EMA $"+s.ema21.toFixed(2)),
      p(s.c4,"C4 EMA21 Rising     ",s.emaRising?"yes ↑":"no ↓"),
      p(s.c5,"C5 Within 10% EMA21 ",s.pctEMA.toFixed(1)+"%"),
      p(s.c6,"C6 -25% off 52w Hi  ",s.pctHi.toFixed(1)+"%  Hi: $"+s.high52.toFixed(2)),
      "",
      "SCORE: "+s.score+"/6  "+[s.c1,s.c2,s.c3,s.c4,s.c5,s.c6].map((c,i)=>"C"+(i+1)+":"+(c?"✅":"❌")).join(" "),
    ].join("\n");
  }catch(e){
    out.style.color="#FF5252";
    out.textContent=sym+" ERROR: "+e.message;
  }
}

loadSaved();
</script>
